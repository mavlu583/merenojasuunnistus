<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <title>Ylläpito</title>
  <script src="config.js"></script>
  <script src="admin.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; background:#f3f4f6; margin:0; }
    .wrap { max-width:1100px; margin:32px auto; padding:0 16px; }
    h1 { text-align:center; margin-bottom:8px; }
    p.sub { text-align:center; color:#6b7280; margin-top:0; margin-bottom:24px; }
    .card {
      background:#fff; border-radius:16px; padding:20px;
      box-shadow:0 10px 25px rgba(15,23,42,0.12); margin-bottom:20px;
    }
    .grid { display:grid; grid-template-columns:1.1fr 1.1fr; gap:20px; }
    @media (max-width:900px) { .grid { grid-template-columns:1fr; } }
    label { font-weight:600; display:block; margin-top:10px; margin-bottom:4px; }
    input, select, textarea {
      width:100%; padding:8px 10px; border-radius:10px;
      border:1px solid #d1d5db; font-size:14px;
    }
    textarea { min-height:60px; resize:vertical; }
    button {
      padding:8px 14px; border:none; border-radius:999px;
      font-size:14px; font-weight:600; cursor:pointer;
      background:linear-gradient(135deg,#2563eb,#1d4ed8); color:#fff;
      margin-top:10px;
    }
    button:hover { filter:brightness(1.05); }
    .danger { background:#b91c1c; }
    .pill {
      display:inline-block; padding:2px 8px; border-radius:999px;
      background:#e5e7eb; font-size:12px; margin-left:6px;
    }
    .muted { color:#6b7280; font-size:13px; }
    .item {
      background:#f9fafb; border-radius:12px; padding:10px 12px;
      border:1px solid #e5e7eb; margin-top:8px;
      display:flex; justify-content:space-between; gap:10px; align-items:center;
    }
    .item-main { font-size:14px; }
    #loginCard { max-width:420px; margin:40px auto; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Ylläpito</h1>
    <p class="sub">Superadmin ja opettajat hallitsevat oppilaita, ratoja ja suorituksia</p>

    <div id="loginCard" class="card">
      <h3>Kirjaudu</h3>
      <p class="muted">Syötä ylläpitokoodi tai opettajakoodi.</p>
      <label for="adminCode">Koodi</label>
      <input id="adminCode" type="password" placeholder="Kirjoita koodi">
      <button onclick="kirjauduAdmin()">Kirjaudu</button>
    </div>

    <div id="panel" style="display:none;">
      <div class="card" id="infoBox"></div>

      <div class="grid">
        <div>
          <div class="card">
            <h3>Oppilaat</h3>
            <label>Nimi</label>
            <input id="oppNimi">

            <label>Luokka</label>
            <input id="oppLuokka">

            <label>Oppilaan ID</label>
            <input id="oppID">

            <label>Oppilaan opettajat</label>
            <div id="oppOpettajat" class="muted"></div>

            <label>Rata-oikeus</label>
            <select id="oppRataOikeus">
              <option value="valitsee">Oppilas valitsee radan</option>
              <option value="maaritettu">Rata määrätty valmiiksi</option>
            </select>

            <div id="oppRataAlue">
              <label>Määrätty rata</label>
              <select id="oppRataSelect"></select>
            </div>

            <button onclick="tallennaOppilas()">Tallenna oppilas</button>
          </div>

          <div class="card">
            <h3>Oppilaslista</h3>
            <div id="oppilaat" class="muted">Ladataan...</div>
          </div>
        </div>

        <div>
          <div class="card">
            <h3>Ratat</h3>
            <label>Radan nimi</label>
            <input id="rataNimi">
            <button onclick="lisaaRata()">Lisää rata</button>

            <div id="radat" class="muted" style="margin-top:10px;">Ei ratoja.</div>
          </div>

          <div class="card" id="opettajaBox" style="display:none;">
            <h3>Opettajat</h3>

            <label>Opettajan nimi</label>
            <input id="opeNimi">

            <label>Opettajan koodi</label>
            <input id="opeKoodi">

            <label>Näkyvyys</label>
            <select id="opeNakyvyys">
              <option value="omat">Näkee vain omat oppilaat</option>
              <option value="kaikki">Näkee kaikki oppilaat</option>
            </select>

            <button onclick="lisaaOpettaja()">Lisää opettaja</button>

            <div id="opettajat" class="muted" style="margin-top:10px;">Ei opettajia.</div>
          </div>

          <div class="card">
            <h3>Suoritukset (rastikäynnit)</h3>
            <div id="suoritukset" class="muted">Ei suorituksia.</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
