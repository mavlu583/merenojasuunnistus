<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <title>Rasti 5</title>
  <script src="config.js"></script>
</head>
<body>

<h2>Rasti 5</h2>

<p><b>Oppilas:</b> <span id="oppilas"></span></p>
<p><b>Rata:</b> <span id="rata"></span></p>
<p><b>Rastikoodi:</b> <span id="koodi"></span></p>

<button onclick="valmis()">Valmis</button>

<script>
const p = new URLSearchParams(location.search);
const oppilasID = p.get("id");
const rataNimi = p.get("rata");

async function hae() {
  const res = await fetch(API_URL);
  const lista = await res.json();

  const oppilas = lista.find(x => x.tyyppi==="oppilas" && x.id===oppilasID);
  const rata = lista.find(x => x.tyyppi==="rata" && x.nimi===rataNimi);

  document.getElementById("oppilas").textContent = oppilas.nimi;
  document.getElementById("rata").textContent = rata.nimi;

  document.getElementById("koodi").textContent = rata.rastit?.[4] || "Ei koodia";
}

function valmis() {
  alert("Rata suoritettu!");
  location.href = "start.html";
}

hae();
</script>

</body>
</html>
