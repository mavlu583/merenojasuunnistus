<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <title>Oppilaan tiedot</title>
  <script src="config.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; background:#f3f4f6; margin:0; }
    .wrap { max-width:480px; margin:40px auto; padding:0 16px; }
    .card {
      background:#fff; border-radius:16px; padding:24px;
      box-shadow:0 10px 25px rgba(15,23,42,0.12);
    }
    h2 { margin:0 0 8px; text-align:center; }
    p.sub { text-align:center; color:#6b7280; margin:0 0 24px; }
    label { font-weight:600; display:block; margin-top:12px; margin-bottom:4px; }
    input, select {
      width:100%; padding:10px 12px; border-radius:10px;
      border:1px solid #d1d5db; font-size:15px;
    }
    input[disabled] { background:#f9fafb; color:#4b5563; }
    button {
      width:100%; margin-top:20px; padding:11px 14px;
      border:none; border-radius:999px; font-size:15px;
      font-weight:600; cursor:pointer;
      background:linear-gradient(135deg,#2563eb,#1d4ed8); color:#fff;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h2>Oppilaan tiedot</h2>
      <p class="sub">Tarkista nimi ja rata</p>

      <label>Nimi</label>
      <input id="nimi" disabled>

      <label>Luokka</label>
      <input id="luokka" disabled>

      <div id="rataValintaAlue"></div>

      <button onclick="aloita()">Aloita rata</button>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const oppilasID = params.get("id");
    let oppilasData = null;
    let radat = [];

    if (!oppilasID) {
      alert("Oppilaan ID puuttuu");
      location.href = "start.html";
    }

    async function haeKaikki() {
      const res = await fetch(API_URL);
      return await res.json();
    }

    async function alusta() {
      const lista = await haeKaikki();
      oppilasData = lista.find(x => x.tyyppi==="oppilas" && x.id===oppilasID);
      if (!oppilasData) {
        alert("Oppilasta ei löytynyt");
        location.href = "start.html";
        return;
      }

      document.getElementById("nimi").value = oppilasData.nimi;
      document.getElementById("luokka").value = oppilasData.luokka;

      radat = lista.filter(x => x.tyyppi==="rata");
      const alue = document.getElementById("rataValintaAlue");
      alue.innerHTML = "";

      if (oppilasData.saaValitaRadan) {
        const label = document.createElement("label");
        label.textContent = "Valitse rata";
        const select = document.createElement("select");
        select.id = "rataValinta";
        radat.forEach(r => {
          const opt = document.createElement("option");
          opt.value = r.nimi;
          opt.textContent = r.nimi;
          select.appendChild(opt);
        });
        alue.appendChild(label);
        alue.appendChild(select);
      } else {
        const label = document.createElement("label");
        label.textContent = "Rata";
        const input = document.createElement("input");
        input.id = "rataLukittu";
        input.disabled = true;
        input.value = oppilasData.rata || "";
        alue.appendChild(label);
        alue.appendChild(input);
      }
    }

    function aloita() {
      let rataNimi = "";
      if (oppilasData.saaValitaRadan) {
        const sel = document.getElementById("rataValinta");
        if (!sel || !sel.value) { alert("Valitse rata"); return; }
        rataNimi = sel.value;
      } else {
        rataNimi = oppilasData.rata;
        if (!rataNimi) { alert("Rata puuttuu"); return; }
      }
      location.href =
        `rasti.html?id=${encodeURIComponent(oppilasID)}&rata=${encodeURIComponent(rataNimi)}&i=1`;
    }

    alusta();
  </script>
</body>
</html>
